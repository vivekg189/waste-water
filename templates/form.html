<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Entry — AquaTrack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="brand-icon" aria-hidden="true"><i class="fas fa-droplet"></i></span>
                AquaTrack
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/form" class="active">Data Entry</a></li>
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/prediction">Prediction</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <header class="page-header">
            <h1>Log water usage</h1>
            <p class="subtitle">Tank drop = consumption since the last reading. Keep times accurate so hourly charts stay meaningful.</p>
        </header>

        <div class="form-shell glass-card form-card">
            <form id="waterForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="date"><i class="fas fa-calendar-day"></i> Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label for="time"><i class="fas fa-clock"></i> Time</label>
                        <input type="time" id="time" name="time" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tankCapacity">Tank capacity (L)</label>
                        <input type="number" id="tankCapacity" name="tankCapacity" min="0" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="prevLevel">Previous level (L)</label>
                        <input type="number" id="prevLevel" name="prevLevel" min="0" step="0.01" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="currLevel">Current level (L)</label>
                        <input type="number" id="currLevel" name="currLevel" min="0" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="students">Residents / students</label>
                        <input type="number" id="students" name="students" min="1" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="area">Primary usage zone</label>
                        <select id="area" name="area" required>
                            <option value="">Select area</option>
                            <option value="Bathroom">Bathroom</option>
                            <option value="Kitchen">Kitchen</option>
                            <option value="Laundry">Laundry</option>
                            <option value="Cleaning">Cleaning</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="block">Block / wing</label>
                        <input type="text" id="block" name="block" placeholder="e.g. Block A" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Submit reading</button>
            </form>

            <div id="message" class="message"></div>
        </div>
    </div>

    <footer class="site-footer">Tip: log at consistent intervals for smoother heatmaps</footer>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
